<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semua Projek - Legal & Digital Marketing</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="image/logoResmiin1.svg" alt="Logo" style="height: 48px; width: auto; max-width: 100%;">
      </div>
      
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="index.html" class="nav-link">
            <i class="ph ph-house"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="input-project.html" class="nav-link">
            <i class="ph ph-plus-circle"></i> Input Project
          </a>
        </li>
        <li class="nav-item">
          <a href="kanban.html" class="nav-link">
            <i class="ph ph-kanban"></i> Kanban Board
            <span class="badge" id="kanban-badge">0</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="all-projects.html" class="nav-link active">
            <i class="ph ph-folders"></i> All Projects
          </a>
        </li>
        <li class="nav-item">
          <a href="cash-flow.html" class="nav-link">
            <i class="ph ph-wallet"></i> Cash Flow
          </a>
        </li>
      </ul>

    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <div class="header-title">
          <h1>Database Projek</h1>
          <p>Seluruh riwayat dan status projek aktif maupun selesai</p>
        </div>
        <div class="header-actions">
           <div style="position: relative;">
             <i class="ph ph-magnifying-glass" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
             <input type="text" class="form-control" placeholder="Cari nama klien / no HP..." style="padding-left: 36px; width: 250px;">
           </div>
           <button class="btn-primary" style="padding: 10px 16px;"><i class="ph ph-funnel"></i> Filter</button>
        </div>
      </header>

      <section class="data-table-container">
        <table>
          <thead>
            <tr>
              <th>ID Projek</th>
              <th>Nama Klien / Perusahaan</th>
              <th>Layanan</th>
              <th>Sumber</th>
              <th>Tenggat Waktu</th>
              <th>Status Pembayaran</th>
              <th>Status Pengerjaan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="projectsTableBody">
            <!-- Data dari Firebase akan muncul di sini -->
          </tbody>
        </table>
        
        <div id="table-info" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding: 0 10px;">
           <span style="color: var(--text-muted); font-size: 0.9rem;" id="table-count">Memuat data...</span>
        </div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
  <script type="module">
    import { listenToProjects } from './db.js';

    const serviceLabels = {
      'legal-pt': 'Pendirian PT', 'legal-cv': 'Pendirian CV',
      'legal-haki': 'HAKI', 'marketing-social': 'Social Media',
      'marketing-ads': 'Google/Meta Ads', 'marketing-web': 'Pembuatan Website'
    };
    const sourceLabels = {
      'wa': 'WhatsApp', 'ig': 'Instagram', 'web': 'Website', 'google': 'Google'
    };
    const statusLabels = {
      'leads':'Leads','drafting':'Drafting','process':'On Process',
      'hold':'On Hold','done':'Done','trouble':'Trouble'
    };
    const statusColors = {
      'leads':'#F59E0B','drafting':'#3B82F6','process':'#8B5CF6',
      'hold':'#6B7280','done':'#10B981','trouble':'#EF4444'
    };
    const paymentLabels = {
      'unpaid': 'Unpaid', 'dp': 'DP', 'paid': 'Lunas'
    };
    const paymentColors = {
      'unpaid': '#F59E0B', 'dp': '#3B82F6', 'paid': '#10B981'
    };

    listenToProjects((projects) => {
      const tbody = document.getElementById('projectsTableBody');
      const countEl = document.getElementById('table-count');
      const badge = document.getElementById('kanban-badge');

      if (badge) badge.textContent = projects.length;
      tbody.innerHTML = '';

      if (projects.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px; color:var(--text-muted);">Belum ada data project. Silakan input project baru.</td></tr>';
        if (countEl) countEl.textContent = '0 projek';
        return;
      }

      projects.forEach((project, i) => {
        const status = project.status || 'leads';
        const payment = project.paymentStatus || 'unpaid';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span style="font-family:monospace;color:var(--text-muted);font-size:0.85rem;">#PRJ-${String(i+1).padStart(3,'0')}</span></td>
          <td><strong>${project.picName || '-'}</strong><br><span style="font-size:0.8rem;color:var(--text-muted);">${project.companyName || '-'}</span></td>
          <td>${serviceLabels[project.service] || project.service || '-'}</td>
          <td>${sourceLabels[project.source] || project.source || '-'}</td>
          <td>${project.deadline || '-'}</td>
          <td><span style="background:rgba(${payment==='paid'?'16,185,129':payment==='dp'?'59,130,246':'245,158,11'},0.1);color:${paymentColors[payment]};padding:3px 8px;border-radius:6px;font-size:0.8rem;font-weight:500;">${paymentLabels[payment]}</span></td>
          <td><span style="background:rgba(0,0,0,0.05);color:${statusColors[status]};padding:3px 8px;border-radius:6px;font-size:0.8rem;font-weight:600;">${statusLabels[status]}</span></td>
          <td><button class="icon-btn" style="width:32px;height:32px;"><i class="ph ph-dots-three"></i></button></td>
        `;
        tbody.appendChild(tr);
      });

      if (countEl) countEl.textContent = `Total ${projects.length} projek`;
    });
  </script>
</body>
</html>
